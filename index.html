function normalizeStoreData(){
  storeData.forEach(v=>{
    const name = String(v.name || "");

    // KT 플라자 사직종합운동장점 강제 보정
    if(
      name.includes("KT 플라자 사직종합운동장점") ||
      name.includes("KT플라자 사직종합운동장점")
    ){
      v.sido = "부산광역시";
      v.city = "동래구";

      if(v.addr){
        v.addr = String(v.addr)
          .replace(/부산시/g, "부산광역시")
          .replace(/부산광영시/g, "부산광역시")
          .replace(/부산시\s*부산광역시/g, "부산광역시");
      }
    }

    // KT플라자 화명역점 강제 보정
    if(
      name.includes("KT플라자 화명역점") ||
      name.includes("KT 플라자 화명역점")
    ){
      v.sido = "부산광역시";
      v.city = "북구";

      if(v.addr){
        v.addr = String(v.addr)
          .replace(/부산시/g, "부산광역시")
          .replace(/부산광영시/g, "부산광역시")
          .replace(/부산시\s*부산광역시/g, "부산광역시");
      }
    }
  });
}

function updateMapTopHud(count, selectedStore=null, summary=null){
  const hud = document.getElementById('mapTopHud');
  if(!hud) return;

  const line1 = hud.querySelector('.mapHudLine1');
  const line2 = hud.querySelector('.mapHudLine2');
  const line3 = hud.querySelector('.mapHudLine3');
  const line4 = hud.querySelector('.mapHudLine4');
  const line5 = hud.querySelector('.mapHudLine5');
  const line6 = hud.querySelector('.mapHudLine6');
  const line7 = hud.querySelector('.mapHudLine7');

  if(!line1 || !line2 || !line3 || !line4 || !line5 || !line6 || !line7) return;

  const pct = (n,total) => total ? Math.round((n/total)*100) : 0;
  const pct2 = (n,total) => total ? ((n/total)*100).toFixed(2) : "0.00";

  function countsByLayer(dataset){
    return {
      total: dataset.length,
      skt: dataset.filter(v=>v.layer==="SKT").length,
      kt: dataset.filter(v=>v.layer==="KT").length,
      lgu: dataset.filter(v=>v.layer==="LGU+").length,
      retail: dataset.filter(v=>v.layer==="판매점").length
    };
  }

  function applySummary(title, subtitle, areaName, dataset){
    const c = countsByLayer(dataset);

    line1.textContent = title;
    line2.textContent = subtitle || "";

    if(nationalShareMode){
      const all = countsByLayer(storeData || []);
      line3.textContent = `${areaName} 전국비중`;
      line4.textContent = `SKT ${pct2(c.skt, all.skt)}%`;
      line5.textContent = `KT ${pct2(c.kt, all.kt)}%`;
      line6.textContent = `LGU+ ${pct2(c.lgu, all.lgu)}%`;
      line7.textContent = `판매점 ${pct2(c.retail, all.retail)}%`;
      return;
    }

    line3.textContent = `${areaName} 유통점 총 ${c.total.toLocaleString()}개`;
    line4.textContent = `SKT ${c.skt.toLocaleString()}개(${pct(c.skt,c.total)}%)`;
    line5.textContent = `KT ${c.kt.toLocaleString()}개(${pct(c.kt,c.total)}%)`;
    line6.textContent = `LGU+ ${c.lgu.toLocaleString()}개(${pct(c.lgu,c.total)}%)`;
    line7.textContent = `판매점 ${c.retail.toLocaleString()}개(${pct(c.retail,c.total)}%)`;
  }

  if(selectedStore){
    const sido = selectedStore.sido || "";
    const city = selectedStore.city || "";
    const dong = selectedStore.dong || "";
    const layer = selectedStore.layer || "";

    const related = storeData.filter(v =>
      (!sido || v.sido === sido) &&
      (!city || v.city === city)
    );

    const areaName = city || sido || "지역";

    applySummary(
      `${selectedStore.name || "매장명 없음"} [${layer}]`,
      [sido, city, dong].filter(Boolean).join(" ") || selectedStore.addr || "위치 정보 없음",
      areaName,
      related
    );
    return;
  }

  if(summary){
    applySummary(summary.title, summary.subtitle, summary.areaName, summary.data || []);
    return;
  }

  const baseData = storeData.filter(v => selectedLayers.has(v.layer));
  if(baseData.length){
    applySummary('통신시장 유통망 현황', '전국 기준', '전국', baseData);
    return;
  }

  applySummary('선택된 매장 없음', '', '지역', []);
}

function getDuplicateAddressGroups(data){
  const grouped = new Map();

  (data || []).forEach(store=>{
    const key = groupKey(store);
    if(!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(store);
  });

  return [...grouped.values()].filter(items => items.length >= 5);
}

function buildMarkers(data){
  clearInfo();

  clusterer.clear();
  markers=[];

  const grouped = new Map();

  data.forEach(store=>{
    const key = groupKey(store);
    if(!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(store);
  });

  grouped.forEach(items=>{
    const first = items[0];
    const marker = new kakao.maps.Marker({
      position:new kakao.maps.LatLng(first.lat, first.lng),
      image: items.length > 1 ? imgFor('중복') : imgFor(first.layer)
    });

    let info;

    if(items.length > 1){
      info = makeGroupInfo(items);
      makeGroupOverlay(marker, items);
    }else{
      info = makeInfo(first);
    }

    allInfos.push(info);

    kakao.maps.event.addListener(marker,'click',function(){
      clearInfo();
      activeInfo=info;
      info.open(map,marker);

      if(items.length > 1){
        const base = items[0];
        renderList(items);
        updateStat((base.addr || "동일 주소")+" 유통망", items.length);
        updateMapTopHud(items.length, null, {
          title:`동일 주소 유통점 ${items.length}개`,
          subtitle:base.addr || "",
          areaName:base.city || base.sido || "동일 주소",
          data:items
        });
      }else{
        syncFiltersFromStore(first,false);
      }

      if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
    });

    marker.store = first;
    markers.push(marker);
  });

  clusterer.addMarkers(markers);
}

// Distance tool

function calcDistanceMeters(a, b){
  const R = 6371000;
  const lat1 = a.getLat() * Math.PI / 180;
  const lat2 = b.getLat() * Math.PI / 180;
  const dLat = (b.getLat() - a.getLat()) * Math.PI / 180;
  const dLng = (b.getLng() - a.getLng()) * Math.PI / 180;

  const s =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1) * Math.cos(lat2) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  const c = 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  return R * c;
}

function fmtDistance(m){
  if (!isFinite(m)) return "";
  return m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
}

function resetDistanceObjects(){
  if (distanceLine) {
    distanceLine.setMap(null);
    distanceLine = null;
  }

  distanceLabels.forEach(o => o.setMap(null));
  distanceLabels = [];

  distancePointMarkers.forEach(m => m.setMap(null));
  distancePointMarkers = [];

  distancePoints = [];
}

function exitDistanceMode(message){
  distanceMode = false;

function drawDistance(){
  try{
    if (distanceLine) {
      distanceLine.setMap(null);
      distanceLine = null;
    }

    distanceLabels.forEach(o => o.setMap(null));
    distanceLabels = [];

    if (distancePoints.length < 2) return;

    distanceLine = new kakao.maps.Polyline({
      map: map,
      path: distancePoints,
      strokeWeight: 4,
      strokeColor: '#2563eb',
      strokeOpacity: .9,
      strokeStyle: 'solid'
    });

    let total = 0;

    for (let i = 1; i < distancePoints.length; i++) {
      const prev = distancePoints[i - 1];
      const curr = distancePoints[i];
      const seg = calcDistanceMeters(prev, curr);
      total += seg;

      const mid = new kakao.maps.LatLng(
        (prev.getLat() + curr.getLat()) / 2,
        (prev.getLng() + curr.getLng()) / 2
      );

      const segLabel = new kakao.maps.CustomOverlay({
        map: map,
        position: mid,
        content: `<div style="background:#0f172a;color:white;border:1px solid #60a5fa;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;box-shadow:0 6px 18px rgba(0,0,0,.3);white-space:nowrap;">${fmtDistance(seg)}</div>`,
        xAnchor: .5,
        yAnchor: .5
      });

      distanceLabels.push(segLabel);
    }

    const last = distancePoints[distancePoints.length - 1];

    const totalLabel = new kakao.maps.CustomOverlay({
      map: map,
      position: last,
      content: `<div style="background:#172554;color:white;border:1px solid #93c5fd;border-radius:12px;padding:6px 10px;font-size:12px;font-weight:900;box-shadow:0 6px 18px rgba(0,0,0,.3);white-space:nowrap;">총 ${fmtDistance(total)}</div>`,
      xAnchor: .5,
      yAnchor: 1.55
    });

    distanceLabels.push(totalLabel);

    document.getElementById('distanceBox').textContent =
      '총 거리 : ' + fmtDistance(total) + ' · 계속 클릭하면 경유지 추가';

  }catch(err){
    console.error('거리 계산 오류', err);
    document.getElementById('distanceBox').textContent = '거리 계산 오류';
  }
}

function handleDistanceClick(latLng){
  clearInfo();

  distancePoints.push(latLng);

  const marker = new kakao.maps.Marker({
    map: map,
    position: latLng
  });

  distancePointMarkers.push(marker);

  if (distancePoints.length === 1) {
    document.getElementById('distanceBox').textContent = '시작점 선택됨 · 다음 지점을 클릭해줘';
    return;
  }

  drawDistance();
}

  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
});
document.getElementById('mobileToggle').onclick=()=>document.getElementById('sidebar').classList.toggle('open');


function exitDistanceModeForUi() {
  if (distanceMode) {
    exitDistanceMode();
  }
}

document.querySelectorAll('.layerBtn,.actionBtn,.select,.search').forEach(el => {
  el.addEventListener('click', exitDistanceModeForUi);
  el.addEventListener('focus', exitDistanceModeForUi);
});


let lastStoreSelectAt = 0;
let viewportHudTimer = null;

function storesInCurrentViewport(){
  const bounds = map.getBounds();
  return storeData.filter(v => {
    if(!selectedLayers.has(v.layer)) return false;
    if(!v.lat || !v.lng) return false;
    return bounds.contain(new kakao.maps.LatLng(v.lat, v.lng));
  });
}

function updateViewportHud(){
  if(Date.now() < filterHudLockUntil) return;
  if(Date.now() - lastStoreSelectAt < 2500) return;

  const data = storesInCurrentViewport();
  const citySet = new Set(data.map(v => v.city).filter(Boolean));
  const sidoSet = new Set(data.map(v => v.sido).filter(Boolean));

  let areaName = '현재 화면';
  if(citySet.size === 1){
    areaName = [...citySet][0];
  }else if(sidoSet.size === 1){
    areaName = [...sidoSet][0];
  }

  updateMapTopHud(data.length, null, {
    title: '현재 화면 유통점 현황',
    subtitle: '지도 표시 영역 기준',
    areaName,
    data
  });
}

kakao.maps.event.addListener(map, 'idle', function(){
  clearTimeout(viewportHudTimer);
  viewportHudTimer = setTimeout(updateViewportHud, 350);
});


async function initDashboard(){
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error("데이터 파일 로딩 실패: " + res.status);

    storeData = await res.json();
    normalizeStoreData();

    applyFilter(false);
    renderList([]);
    updateStat('전체 선택 유통망',storeData.length);updateMapTopHud(storeData.length);

    setTimeout(()=>{
      map.relayout();
      document.getElementById('loading').classList.add('hidden');
    },600);

  } catch(err) {
    console.error(err);
    document.getElementById('loading').textContent =
      '데이터 파일을 불러오지 못했어. telco_store_data.json 파일이 index.html과 같은 폴더에 있는지 확인해줘.';
  }
}


document.getElementById('myLocationBtn').onclick = () => {
  if (!navigator.geolocation) {
    alert('위치 서비스를 지원하지 않아.');
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const loc = new kakao.maps.LatLng(lat, lng);

    map.setCenter(loc);
    map.setLevel(3);

    if (myLocationMarker) {
      myLocationMarker.setMap(null);
    }

    myLocationMarker = new kakao.maps.CustomOverlay({
      position: loc,
      content: `<div style="width:22px;height:22px;border-radius:50%;background:#2563eb;border:4px solid rgba(255,255,255,.92);box-shadow:0 0 0 10px rgba(37,99,235,.18),0 0 22px rgba(37,99,235,.45);"></div>`,
      xAnchor:0.5,
      yAnchor:0.5
    });

    myLocationMarker.setMap(map);

    if (myLocationCircle) {
      myLocationCircle.setMap(null);
    }

    myLocationCircle = new kakao.maps.Circle({
      center: loc,
      radius: pos.coords.accuracy || 30,
      strokeWeight: 1,
      strokeColor: '#2563eb',
      strokeOpacity: 0.35,
      fillColor: '#2563eb',
      fillOpacity: 0.10
    });

    myLocationCircle.setMap(map);

  }, () => {
    alert('위치 권한을 허용해줘.');
  }, {
    enableHighAccuracy: true,
    timeout: 12000,
    maximumAge: 0
  });
};


// 거리재기: 오른쪽 마우스 클릭 시 초기화
document.getElementById('map').addEventListener('contextmenu', function(e) {
  e.preventDefault();

  if (typeof resetDistanceObjects === 'function') {
    resetDistanceObjects();
  }

  if (typeof exitDistanceMode === 'function') {
    exitDistanceMode('거리 초기화 완료 · 우클릭');
  }

  if (typeof map !== 'undefined') {
    map.setDraggable(true);
    map.setZoomable(true);
  }

  return false;
});


// ===== MOBILE HUD TOGGLE FIX =====
function setupMobileHudToggle(){
  const hud = document.getElementById('mapTopHud');
  const btn = document.getElementById('hudToggleBtn');
  const arrow = document.getElementById('hudArrow');

  if(!hud || !btn) return;

  function collapseHud(){
    if(window.innerWidth <= 768){
      hud.classList.add('collapsed');
      if(arrow) arrow.textContent = '▼';
    }
  }

  function expandHud(){
    if(window.innerWidth <= 768){
      hud.classList.remove('collapsed');
      if(arrow) arrow.textContent = '▲';
    }
  }

  collapseHud();

  btn.onclick = (e)=>{
    e.preventDefault();
    e.stopPropagation();

    hud.classList.toggle('collapsed');

    if(arrow){
      arrow.textContent = hud.classList.contains('collapsed') ? '▼' : '▲';
    }
  };

  kakao.maps.event.addListener(map, 'dragstart', collapseHud);
  kakao.maps.event.addListener(map, 'zoom_changed', collapseHud);
}

setupMobileHudToggle();



// ===== FILTER HUD TO VIEWPORT SWITCH =====
kakao.maps.event.addListener(map, 'idle', function(){
  if(typeof updateViewportHud === 'function'){
    setTimeout(updateViewportHud, 120);
  }
});

initDashboard();

</script>
